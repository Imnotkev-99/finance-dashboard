name: CI

on:
  push:
    branches: [main]
    paths:
      - 'monster-prompt-studio/**'
  pull_request:
    paths:
      - 'monster-prompt-studio/**'

defaults:
  run:
    working-directory: monster-prompt-studio

jobs:
  test:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: monster-prompt-studio/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: Tests E2E (Playwright)
        run: npm run test:e2e

      - name: Subir reporte de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: monster-prompt-studio/playwright-report/
          retention-days: 7
